name: superpower-openspec
version: 2
description: Minimal durable OpenSpec contracts for the Superpower-style workflow. Generated documentation defaults to Chinese unless the user explicitly asks for English.

storage:
  durable_change_dir: openspec/changes/<change-id>
  baseline_spec_dir: docs/<project-name>/<module>/<feature>
  process_workdir: .agent/workdir/sp-openspec/<change-id>
  bootstrap_workdir: .agent/workdir/sp-openspec/bootstrap
  durable_policy: |
    Keep only long-term contracts in openspec/changes/<change-id>: proposal.md,
    design.md, tasks.md, and specs/<capability>/spec.md.
    Write brainstorm, context, review logs, mockups, workflow test-parameter
    records, completion evidence, and other process evidence to process_workdir.
    Current-state baseline specs generated by optional /sp-code-to-spec live
    under docs/<project-name>/<module>/<feature>/spec/spec.md, with
    function-point detail files under spec/, design/, and flow/ when a feature
    contains multiple function points or needs standalone low-level detail.
    They must not be written under openspec/specs because they are project
    knowledge documents, not real OpenSpec change contracts.
    Each feature directory should contain <feature>.md, spec/spec.md,
    design/design.md, flow/flow.md, and other/ for supporting notes when needed.
    Multi-function-point features should also contain real function-point named
    files such as spec/<function-point>-spec.md,
    design/<function-point>-design.md, and flow/<function-point>-flow.md.
    Do not generate old fixed matrix, evidence, or owner-question section
    templates as required /sp-code-to-spec outputs.
    Non-OpenSpec project/module/feature/function-point paths must use real names
    and must not use generic names or sequence numbers.

bootstrap_outputs:
  - docs/ai-context/source-index.md
  - docs/ai-context/codebase-inventory.md
  - openspec/project.md
  - docs/<project-name>/readme.md
  - docs/<project-name>/<module>/readme.md
  - docs/<project-name>/<module>/<feature>/<feature>.md
  - docs/<project-name>/<module>/<feature>/spec/spec.md
  - docs/<project-name>/<module>/<feature>/spec/<function-point>-spec.md
  - docs/<project-name>/<module>/<feature>/design/design.md
  - docs/<project-name>/<module>/<feature>/design/<function-point>-design.md
  - docs/<project-name>/<module>/<feature>/flow/flow.md
  - docs/<project-name>/<module>/<feature>/flow/<function-point>-flow.md
  - docs/<project-name>/<module>/<feature>/other/<supporting-topic>.md
  - docs/rules/business-standards.md
  - docs/rules/<project-rule>.md
  - docs/rules/<language>-code-standards.md
  - docs/rules/<language>-<runtime>-code-standards.md
  - docs/constitutions/<area>.md
  - .agent/workdir/sp-openspec/bootstrap/code-to-spec-review.md

durable_artifacts:
  - id: proposal
    generates: proposal.md
    template: proposal.md
    description: Durable OpenSpec change proposal.
    instruction: |
      Create a formal proposal from confirmed brainstorm/context workdir evidence.
      Focus on problem, goal, scope, value, risks, and open questions.
      Do not include low-level implementation details.

  - id: specs
    generates: specs/<capability>/spec.md
    template: spec.md
    description: Durable capability requirements and scenarios.
    instruction: |
      Create capability specs using Requirement and Scenario format.
      Requirements must describe observable behavior and must be independently
      verifiable from a real user-facing, API-facing, job-facing, or system-facing
      entry point. Specs must provide enough external behavior for design to decide
      whether real E2E is required.

  - id: design
    generates: design.md
    template: design.md
    description: Durable technical design.
    instruction: |
      Create technical design based on proposal, specs, project rules, source
      mapping, and workdir context/review evidence. Include target code paths,
      reuse/common logic plan, database/API/IO/async decisions, confirmation
      evidence, E2E decisions, validation plan, logging/traceability, encoding,
      parameter/data-object constraints including exception-object/map-like
      parameter prohibition and self-explanatory parameter definitions, and
      implementation constraints.

  - id: tasks
    generates: tasks.md
    template: tasks.md
    description: Durable implementation task checklist.
    instruction: |
      Create implementation tasks from specs, approved design, and closed workdir
      design review evidence. Every task must map to requirements and design
      decisions, name target code paths, define validation, identify reusable
      JSON test parameters, identify stable project fixture paths when committed
      tests need reusable files, enforce parameter/data-object constraints including
      exception-object/map-like parameter prohibition and self-explanatory parameter
      definitions, and require per-task alignment and security reviews.

process_evidence:
  path: .agent/workdir/sp-openspec/<change-id>
  files:
    - brainstorm.md
    - context.md
    - brainstorm-review.md
    - spec-review.md
    - design-review.md
    - mockups/
    - tasks-review.md
    - test-params/
    - task-reviews.md
    - review.md
    - completion.md
  policy: |
    Process evidence is required by the workflow but is not a durable OpenSpec
    contract. It should be generated under the process workdir and may be ignored
    by Git unless the project explicitly decides to retain it.

final_outputs:
  - docs/wiki/<feature-or-story-title>.md
  - openspec/changes/archive/<YYYY-MM-DD>-<change-id>/

apply:
  requires:
    - proposal
    - specs
    - design
    - tasks
  tracks: tasks.md

